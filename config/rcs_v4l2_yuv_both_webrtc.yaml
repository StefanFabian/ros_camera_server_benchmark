robot: "bench"
address: "127.0.0.1"
signaling_port: 8443
cameras:
  bench:
    name: "bench_v4l2_yuv_both_webrtc"
    input:
      type: v4l2
      device: "/dev/video40"
      width: 1280
      height: 720
      framerate: "30/1"
    # cam-both-rcs-yuv-webrtc: ROS topic + WebRTC stream from one camera.
    # webrtc_recv connects to ws://127.0.0.1:8443/bench/1 (output index 1
    # since ros2 is index 0 here).
    # No width/height on the outputs — pass-through at input resolution.
    outputs:
      - type: ros2
        topic: "/bench/out_raw"
        frame_id: "bench"
        codec: raw
        format: "rgb8"
      - type: webrtc
        codec: h264
        encoder: ${BENCH_RCS_ENC}
        framerate: "30/1"
        bitrate: 1000
