robot: "bench"
address: "127.0.0.1"
cameras:
  bench:
    name: "bench_v4l2_mjpeg_rtponly"
    input:
      type: v4l2
      device: "/dev/video41"
      width: 1280
      height: 720
      framerate: "30/1"
    # cam-stream-rcs-mjpeg-rtp variant (currently unused in the matrix, but
    # kept symmetric with rcs_v4l2_yuv_rtponly.yaml for future scenarios).
    outputs:
      - type: rtp
        codec: h264
        encoder: ${BENCH_RCS_ENC}
        framerate: "30/1"
        host: "127.0.0.1"
        port: 7100
        bitrate: 1000
        width: 1280
        height: 720
