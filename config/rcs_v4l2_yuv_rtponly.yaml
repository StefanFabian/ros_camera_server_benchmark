robot: "bench"
address: "127.0.0.1"
cameras:
  bench:
    name: "bench_v4l2_yuv_rtponly"
    input:
      type: v4l2
      device: "/dev/video40"
      width: ${BENCH_WIDTH}
      height: ${BENCH_HEIGHT}
      framerate: "30/1"
    # cam-stream-rcs-yuv-rtp: RTP output only (no ROS topic side-effect). Pairs
    # with the combined config rcs_v4l2_yuv.yaml which is used for cam-both.
    outputs:
      - type: rtp
        codec: h264
        encoder: ${BENCH_RCS_ENC}
        framerate: "30/1"
        host: "127.0.0.1"
        port: 7100
        bitrate: 1000
        width: ${BENCH_WIDTH}
        height: ${BENCH_HEIGHT}
