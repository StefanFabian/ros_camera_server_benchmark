robot: "bench"
address: "127.0.0.1"
cameras:
  bench:
    name: "bench_v4l2_mjpeg_decoded_rtp"
    input:
      type: v4l2
      device: "/dev/video11"
      width: 1280
      height: 720
      framerate: "30/1"
    # cam-both-rcs-mjpeg-decoded-rtp: same as rcs_v4l2_mjpeg_decoded.yaml
    # plus an RTP H.264 output. Lets the cam-both dual-receiver matrix
    # compare rcs's MJPEG-camera-to-rgb8-topic-AND-stream against
    # usb_cam+gst_bridge / gscam+gst_bridge which always decode MJPEG to
    # rgb8 inside the driver before encoding.
    outputs:
      - type: ros2
        topic: "/bench/out_raw"
        frame_id: "bench"
        codec: raw
        format: "rgb8"
      - type: rtp
        codec: h264
        encoder: ${BENCH_RCS_ENC}
        framerate: "30/1"
        host: "127.0.0.1"
        port: 7100
        bitrate: 1000
        width: 1280
        height: 720
