robot: "bench"
address: "127.0.0.1"
cameras:
  bench:
    name: "bench_v4l2_yuv_rosonly"
    input:
      type: v4l2
      device: "/dev/video40"
      width: 1280
      height: 720
      framerate: "30/1"
    # cam-ros-rcs-yuv: ROS-topic-only output. The dual-output config
    # (rcs_v4l2_yuv.yaml) is reserved for cam-both-rcs-yuv-rtp; sharing it
    # with cam-ros ran an unused RTP encoder alongside the ROS publish,
    # which is not what usb_cam / gscam do in their cam-ros arms.
    outputs:
      - type: ros2
        topic: "/bench/out_raw"
        frame_id: "bench"
        codec: raw
        format: "rgb8"
