launch:
  # ros-stream-web_video_server-raw-mjpeg: ros_pub raw input -> web_video_server MJPEG over HTTP.
  # Same as web_video_server_h264_ros_raw but native MJPEG default.
  - arg: { name: "wvs_port", default: "8888" }

  - node:
      pkg: "web_video_server"
      exec: "web_video_server"
      name: "web_video_server"
      param:
        - { name: "port", value: "$(var wvs_port)" }
        - { name: "default_stream_type", value: "mjpeg" }
