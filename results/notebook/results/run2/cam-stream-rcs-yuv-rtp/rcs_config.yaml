robot: "bench"
address: "127.0.0.1"
cameras:
  bench:
    name: "bench_v4l2_yuv_rtponly"
    input:
      type: v4l2
      device: "/dev/video10"
      width: 1280
      height: 720
      framerate: "30/1"
    # cam-stream-rcs-yuv-rtp: RTP output only (no ROS topic side-effect). Pairs
    # with the combined config rcs_v4l2_yuv.yaml which is used for cam-both.
    outputs:
      - type: rtp
        codec: h264
        encoder: NV
        framerate: "30/1"
        host: "127.0.0.1"
        port: 7100
        bitrate: 1000
        width: 1280
        height: 720
