robot: "bench"
address: "127.0.0.1"
cameras:
  bench:
    name: "bench_ros_jpeg"
    input:
      type: ros2
      topic: "/bench/image_compressed"
      format: jpeg
    outputs:
      - type: rtp
        codec: h264
        encoder: NV
        framerate: "30/1"
        host: "127.0.0.1"
        port: 7100
        bitrate: 1000
        width: 1280
        height: 720
