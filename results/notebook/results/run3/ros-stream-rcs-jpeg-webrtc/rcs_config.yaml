robot: "bench"
address: "127.0.0.1"
signaling_port: 8443
cameras:
  bench:
    name: "bench_ros_jpeg_webrtc"
    input:
      type: ros2
      topic: "/bench/image_compressed"
      format: jpeg
      # Pin source caps so the encoder negotiates deterministically (see
      # rcs_ros_raw_webrtc.yaml for the longer note).
      width: 1920
      height: 1080
      framerate: "30/1"
    # ros-stream-rcs-jpeg-webrtc: ROS compressed input -> WebRTC H.264. No
    # width/height on the output — we don't want a Scale node.
    outputs:
      - type: webrtc
        codec: h264
        encoder: VA_LP
        framerate: "30/1"
        bitrate: 1000
